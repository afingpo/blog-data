name: 友链申请处理

on:
  issues:
    types: [opened, reopened]
  issue_comment:
    types: [created]

jobs:
  process-link:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 处理并写入数据
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const issue = context.payload.issue;
            const body = issue.body || '';

            // 1. 标签检查
            if (!issue.labels.some(l => l.name === '友链申请')) return;

            // 2. 评论检查
            if (context.eventName === 'issue_comment' && context.payload.comment.user.login !== issue.user.login) return;

            // 3. 提取字段
            const extractField = (label, text) => {
              const regex = new RegExp(`### ${label}\\s*\\n([^#\\n]+)`, 'i');
              const match = text.match(regex);
              return match ? match[1].trim() : null;
            };

            const data = {
              title: extractField('网站名称', body),
              siteurl: extractField('网站链接', body),
              desc: extractField('网站描述', body),
              imgurl: extractField('网站头像', body)
            };

            // 报错反馈
            if (!data.title || !data.siteurl) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number,
                body: '处理失败：无法从表单中提取必要字段。'
              });
              throw new Error('字段提取失败');
            }

            // 4. 写入 JSON
            const filePath = path.join(process.cwd(), 'src/links.json');
            const links = JSON.parse(fs.readFileSync(filePath, 'utf-8'));
            
            if (links.some(l => l.siteurl === data.siteurl)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number,
                body: '提示：该链接已存在于列表中。'
              });
              return;
            }

            links.push(data);
            fs.writeFileSync(filePath, JSON.stringify(links, null, 2));

      - name: 提交 PR
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          add-paths: src/links.json
          commit-message: "feat: add friend link from #${{ github.event.issue.number }}"
          branch: auto-link/${{ github.event.issue.number }}
          title: "友链申请: ${{ github.event.issue.title }}"
          body: "此 PR 由 Issue #${{ github.event.issue.number }} 自动生成。"
          delete-branch: true

      - name: 反馈执行结果
        uses: actions/github-script@v7
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = '${{ steps.cpr.outputs.pull-request-number }}';
            const body = prNumber 
              ? `处理完成：已自动创建 PR #${prNumber}，请查阅。` 
              : '处理结束：未检测到变动或已存在。';
            
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.payload.issue.number,
              body: body
            });

