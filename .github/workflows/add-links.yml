name: Auto Add Link
on:
  issues:
    types: [opened]

jobs:
  add-link:
    # 确保只处理带有“友链申请”标签的 Issue
    if: contains(github.event.issue.labels.*.name, '友链申请')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Parse Issue Form
        id: parse
        uses: stefanbuck/github-issue-parser@v3
        with:
          template-path: .github/ISSUE_TEMPLATE/links.yml

      - name: Check URL Accessibility
        shell: bash
        env:
          JSON_DATA: ${{ steps.parse.outputs.jsonString }}
        run: |
          # 提取 siteurl 和 imgurl
          SITE_URL=$(echo "$JSON_DATA" | jq -r '.siteurl')
          IMG_URL=$(echo "$JSON_DATA" | jq -r '.imgurl')
          
          # 检查站点链接 (返回码必须为 200 或 301/302 重定向)
          echo "正在检查站点: $SITE_URL"
          curl -I -L --fail --silent --show-error --max-time 10 "$SITE_URL" > /dev/null
          
          # 检查头像链接
          echo "正在检查头像: $IMG_URL"
          curl -I -L --fail --silent --show-error --max-time 10 "$IMG_URL" > /dev/null
          
          echo "✅ 链接访问正常，准备处理数据。"

      - name: Update JSON
        shell: bash
        env:
          # 解析后的 JSON 字符串
          JSON_DATA: ${{ steps.parse.outputs.jsonString }}
        run: |
          # 使用 jq 构建新的链接对象
          # 注意：id 必须与 links.yml 中的 id 一一对应
          echo "$JSON_DATA" | jq '{title: .title, siteurl: .siteurl, desc: .desc, imgurl: .imgurl}' > new_link.json
          
          # 将新对象追加到原数组末尾
          # 如果原文件是空的或损坏，jq 会报错，建议确保 links.json 初始至少是 []
          jq -s '.[0] + [.[1]]' src/links.json new_link.json > temp.json && mv temp.json src/links.json
          
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: add friend link from #${{ github.event.issue.number }}"
          branch: add-link/${{ github.event.issue.number }}
          delete-branch: true
          title: "友链申请: ${{ github.event.issue.title }}"
          body: "自动处理友链申请 #${{ github.event.issue.number }}，请审核数据是否准确。"

