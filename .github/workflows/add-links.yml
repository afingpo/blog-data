name: 友链申请处理

on:
  issues:
    types: [opened, reopened]
  issue_comment:
    types: [created]

jobs:
  process-link:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 处理友链申请
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';
            
            console.log('--- 调试信息 ---');
            console.log('标签列表:', issue.labels.map(l => l.name));
            console.log('Issue 内容:', body);
            
            // 确保标签存在
            if (!issue.labels.some(l => l.name === '友链申请')) {
              console.log('【停止】未检测到标签 [友链申请]');
              return;
            }

            // 正则匹配：兼容表单提交后可能产生的额外空行
            const extractField = (label, text) => {
              const regex = new RegExp(`### ${label}\\s*\\n([^#\\n]+)`, 'i');
              const match = text.match(regex);
              return match ? match[1].trim() : null;
            };

            const data = {
              title: extractField('网站名称', body),
              siteurl: extractField('网站链接', body),
              desc: extractField('网站描述', body),
              imgurl: extractField('网站头像', body)
            };
            
            console.log('解析数据:', data);
            
            if (!data.title || !data.siteurl) {
              console.log('【停止】未能提取到必要字段');
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number,
                body: '解析失败：请确认 Issue 内容是否符合表单格式。'
              });
              return;
            }

            const { execSync } = require('child_process');
            try {
              console.log('正在校验链接:', data.siteurl);
              execSync(`curl -I -L --fail --max-time 10 "${data.siteurl}"`);
            } catch (e) {
              console.log('【警告】链接校验失败');
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number,
                body: `警告：无法访问链接 ${data.siteurl}。`
              });
            }

      - name: 提交 PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: add friend link from #${{ github.event.issue.number }}"
          branch: auto-link/${{ github.event.issue.number }}
          title: "友链申请: ${{ github.event.issue.title }}"
          body: "此 PR 由 Issue #${{ github.event.issue.number }} 自动生成。"
          delete-branch: true

