
name: 友链申请处理

on:
  issues:
    types: [opened, reopened]
  issue_comment:
    types: [created]

jobs:
  process-link:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 处理并写入数据
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const issue = context.payload.issue;
            const body = issue.body || '';

            // 1. 标签检查
            if (!issue.labels.some(l => l.name === '友链申请')) {
              console.log('未检测到标签，跳过');
              return;
            }

            // 2. 评论检查
            if (context.eventName === 'issue_comment' && context.payload.comment.user.login !== issue.user.login) return;

            // 3. 提取字段
            const extractField = (label, text) => {
              const regex = new RegExp(`### ${label}\\s*\\n([^#\\n]+)`, 'i');
              const match = text.match(regex);
              return match ? match[1].trim() : null;
            };

            const data = {
              title: extractField('网站名称', body),
              siteurl: extractField('网站链接', body),
              desc: extractField('网站描述', body),
              imgurl: extractField('网站头像', body)
            };

            if (!data.title || !data.siteurl) throw new Error('数据提取失败：请检查 Issue 格式');

            // 4. 校验链接
            const { execSync } = require('child_process');
            try {
              execSync(`curl -I -L --fail --max-time 5 "${data.siteurl}"`);
            } catch (e) {
              throw new Error(`链接无法访问: ${data.siteurl}`);
            }

            // 5. 写入 JSON
            const filePath = path.join(process.cwd(), 'src/links.json');
            if (!fs.existsSync(filePath)) throw new Error('找不到 src/links.json 文件');
            
            const links = JSON.parse(fs.readFileSync(filePath, 'utf-8'));
            if (links.some(l => l.siteurl === data.siteurl)) {
              console.log('链接已存在，无需更新');
              return;
            }

            links.push(data);
            fs.writeFileSync(filePath, JSON.stringify(links, null, 2));
            
            // 验证文件是否真的写入了
            if (!fs.existsSync(filePath)) throw new Error('文件写入失败');
            console.log('成功更新 src/links.json');

      - name: 提交 PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: add link ${{ github.event.issue.title }}"
          branch: auto-link/${{ github.event.issue.number }}
          title: "友链申请: ${{ github.event.issue.title }}"
          body: "此 PR 由 Issue #${{ github.event.issue.number }} 自动生成。"
          delete-branch: true

