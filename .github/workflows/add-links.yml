name: 友链申请处理

on:
  issues:
    types: [opened, reopened]
  issue_comment:
    types: [created]

jobs:
  process-link:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 处理友链申请
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const issue = context.payload.issue;
            const body = issue.body || '';

            // 检查标签
            const isFriendRequest = issue.labels.some(l => l.name === '友链申请');
            if (!isFriendRequest) return;

            // 评论触发检查：确保是作者回复
            if (context.eventName === 'issue_comment' && context.payload.comment.user.login !== issue.user.login) return;

            // 提取字段
            function extractField(label, text) {
              const regex = new RegExp(`### ${label}\\s*\\n([^#]+)`, 'i');
              const match = text.match(regex);
              return match ? match[1].trim() : null;
            }

            const data = {
              title: extractField('网站名称', body),
              siteurl: extractField('网站链接', body),
              desc: extractField('网站描述', body),
              imgurl: extractField('网站头像', body)
            };

            if (!data.title || !data.siteurl) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number,
                body: '信息不完整，请检查表单是否填写正确。'
              });
              return;
            }

            // 校验 URL 可访问性
            const { execSync } = require('child_process');
            try {
              execSync(`curl -I -L --fail --max-time 5 "${data.siteurl}"`);
            } catch (e) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number,
                body: `警告：无法访问链接 ${data.siteurl}，请确认地址是否有效。`
              });
              return;
            }

      - name: 提交 PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: add friend link for ${{ github.event.issue.title }}"
          branch: auto-link/${{ github.event.issue.number }}
          title: "友链申请: ${{ github.event.issue.title }}"
          body: |
            此 PR 由 Issue #${{ github.event.issue.number }} 自动生成。
            请人工确认友链信息是否符合规范。
          delete-branch: true

