name: 友链申请处理

on:
  issues:
    types: [opened, reopened]
  issue_comment:
    types: [created]

jobs:
  process-link:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 逻辑校验与处理
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const issue = context.payload.issue;
            const comment = context.payload.comment;

            // 1. 过滤：非 re-check 评论或非相关 Issue 不执行
            const isRecheck = comment && comment.body.includes('re-check');
            const isLabelled = issue.labels.some(l => l.name === '友链申请');
            
            if (context.eventName === 'issue_comment' && !isRecheck) return;
            if (!isLabelled) return;

            // 2. 字段提取
            const body = issue.body || '';
            const extractField = (label, text) => {
              const regex = new RegExp(`### ${label}\\s*\\n([^#\\n]+)`, 'i');
              const match = text.match(regex);
              return match ? match[1].trim() : null;
            };

            const data = {
              title: extractField('网站名称', body),
              siteurl: extractField('网站链接', body),
              desc: extractField('网站描述', body),
              imgurl: extractField('网站头像', body)
            };

            // 反馈：字段缺失
            if (!data.title || !data.siteurl) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number,
                body: `❌ **处理失败**\n\n原因：未能从表单中提取必要字段（网站名称或链接为空）。请检查 Issue 格式。`
              });
              throw new Error('Missing fields');
            }

            // 3. 链接校验
            const { execSync } = require('child_process');
            try {
              execSync(`curl -I -L --fail --max-time 10 "${data.siteurl}"`);
            } catch (e) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number,
                body: `❌ **链接校验失败**\n\n地址: \`${data.siteurl}\`\n原因：无法访问该链接，请确认地址是否有效。`
              });
              throw new Error('Invalid URL');
            }

            // 4. JSON 更新
            const filePath = path.join(process.cwd(), 'src/links.json');
            const links = JSON.parse(fs.readFileSync(filePath, 'utf-8'));
            
            if (links.some(l => l.siteurl === data.siteurl)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number,
                body: `⚠️ **处理提示**\n\n该链接已存在于列表中。`
              });
              process.exit(0); // 正常结束
            }

            links.push(data);
            fs.writeFileSync(filePath, JSON.stringify(links, null, 2));

      - name: 提交 PR
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          add-paths: src/links.json
          commit-message: "feat: add link from #${{ github.event.issue.number }}"
          branch: auto-link/${{ github.event.issue.number }}
          title: "友链申请: ${{ github.event.issue.title }}"
          body: "此 PR 由 Issue #${{ github.event.issue.number }} 自动生成。"
          delete-branch: true

      - name: 反馈最终结果
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = '${{ steps.cpr.outputs.pull-request-number }}';
            if (prNumber) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: context.payload.issue.number,
                body: `✅ **处理成功**\n\n已自动创建 PR #${prNumber}，请进行人工二审。`
              });
            }

